name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser project(s) to run (chromium | firefox | webkit | all)'
        required: false
        default: 'all'

permissions:
  contents: write
  checks: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Pre-create allure-results directory
        run: mkdir -p allure-results

      - name: Run Playwright tests (Docker)
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://wtfqsbkm.elementor.cloud' }}
        run: |
          PROJECTS=""
          if [ "${{ github.event.inputs.browser }}" != "all" ] && [ -n "${{ github.event.inputs.browser }}" ]; then
            PROJECTS="--project=${{ github.event.inputs.browser }}"
          else
            PROJECTS="--project=chromium --project=firefox"
          fi
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e CI=true \
            -e BASE_URL="${BASE_URL}" \
            -e HOME=/tmp \
            mcr.microsoft.com/playwright:v1.58.2-noble \
            sh -c "npm ci --ignore-scripts && npx playwright test ${PROJECTS}"

      - name: Upload test results (JUnit XML)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Fetch Allure history from gh-pages
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-history
        continue-on-error: true

      - name: Copy history into allure-results
        if: always()
        run: |
          if [ -d gh-pages-history/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages-history/history/. allure-results/history/
            echo "Allure history restored."
          else
            echo "No previous history found — first run, skipping."
          fi

      - name: Generate Allure HTML report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Upload error screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: src/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
