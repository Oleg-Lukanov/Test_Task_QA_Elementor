name: Code Quality

# Runs on every PR to any branch — acts as a quality gate.
# Checks are read-only: no auto-commits or auto-fixes are made.
on:
  pull_request:
    branches: ['**']

jobs:
  quality:
    name: Type-check · Lint · Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # ── Type safety ───────────────────────────────────────────────────────
      # Fails if any TypeScript type error exists anywhere in the project.
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── Static analysis ───────────────────────────────────────────────────
      # Read-only: reports issues but makes no changes.
      - name: ESLint
        run: npx eslint .

      # ── Formatting gate ───────────────────────────────────────────────────
      # Fails if any file would be changed by Prettier.
      - name: Prettier format check
        run: npx prettier --check .
