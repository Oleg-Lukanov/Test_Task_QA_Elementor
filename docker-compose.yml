services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CI=true
      - BASE_URL=https://wtfqsbkm.elementor.cloud
    command: sh -c "npm ci --ignore-scripts && npx playwright test --project=chromium --project=firefox"
